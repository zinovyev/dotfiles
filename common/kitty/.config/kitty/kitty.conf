# ~/.config/kitty/kitty.conf

########################################
# FONT
########################################

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 13.0

# Ligatures
disable_ligatures never

########################################
# APPEARANCE
########################################

# OneDark-ish background
background #282c34
foreground #abb2bf

selection_background #3e4451
selection_foreground #abb2bf

cursor #528bff
cursor_text_color #282c34

# Minimal UI
tab_bar_style hidden

# Window
window_padding_width 6
confirm_os_window_close 0

# Slight transparency (optional)
background_opacity 0.96

########################################
# PERFORMANCE
########################################

repaint_delay 10
input_delay 3
sync_to_monitor yes

########################################
# SCROLLBACK
########################################

scrollback_lines 10000

########################################
# BELLS
########################################

enable_audio_bell no
visual_bell_duration 0

########################################
# MOUSE
########################################

copy_on_select yes

########################################
# MACOS
########################################

macos_option_as_alt yes
macos_quit_when_last_window_closed yes

########################################
# KEYBINDINGS
########################################

# Remove default kitty "power-user" bindings
clear_all_shortcuts yes

# Copy / Paste
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# New window
map cmd+n new_os_window

# Close window
map cmd+w close_window

# Clear screen
map cmd+k clear_terminal scroll active

# Word navigation
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf
map ctrl+left send_text all \x1bb
map ctrl+right send_text all \x1bf

# Font resize
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

########################################
# ONEDARK PALETTE
########################################

color0  #1e2127
color1  #e06c75
color2  #98c379
color3  #e5c07b
color4  #61afef
color5  #c678dd
color6  #56b6c2
color7  #abb2bf

color8  #5c6370
color9  #e06c75
color10 #98c379
color11 #e5c07b
color12 #61afef
color13 #c678dd
color14 #56b6c2
color15 #ffffff
